name: Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'          # trigger on any v1.4, v2.0, etc.

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so git describe works
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version from git
        id: ver
        run: |
          # If this run was triggered by a vX.Y tag, use it exactly.
          # Otherwise derive a dev version from the latest tag + commit count.
          RAW_TAG=$(git tag --points-at HEAD | grep '^v' | sort -V | tail -1)
          if [ -n "$RAW_TAG" ]; then
            VERSION="${RAW_TAG#v}"          # strip leading "v"
            IS_RELEASE=true
          else
            # e.g. "1.3-14-gabcdef" — useful for dev builds
            DESCRIBED=$(git describe --tags --long --match 'v*' 2>/dev/null || echo "v0.0-0-g$(git rev-parse --short HEAD)")
            BASE="${DESCRIBED%%-*}"; BASE="${BASE#v}"
            COMMITS=$(echo "$DESCRIBED" | cut -d- -f2)
            HASH=$(echo "$DESCRIBED" | cut -d- -f3)
            VERSION="${BASE}.dev${COMMITS}+${HASH}"
            IS_RELEASE=false
          fi
          # versionCode = total commit count (always increasing)
          CODE=$(git rev-list --count HEAD)
          echo "version=$VERSION"   >> $GITHUB_OUTPUT
          echo "code=$CODE"         >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION"      >> $GITHUB_OUTPUT
          echo "Version: $VERSION  Code: $CODE  Release: $IS_RELEASE"

      - name: Patch versionName & versionCode in build.gradle.kts
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          CODE="${{ steps.ver.outputs.code }}"
          sed -i "s/versionCode = [0-9]*/versionCode = $CODE/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"$VERSION\"/" app/build.gradle.kts
          echo "Patched build.gradle.kts:"
          grep -E "versionCode|versionName" app/build.gradle.kts

      - name: Update version badge in README
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # Update the shields.io Version badge line
          sed -i "s|img.shields.io/badge/Version-[^-]*-|img.shields.io/badge/Version-${VERSION}-|g" README.md
          echo "README badge now shows v$VERSION"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > /tmp/key.jks

      - name: Build with Gradle
        env:
          SIGN_KEY_STORE_FILE: "/tmp/key.jks"
          SIGN_KEY_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGN_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGN_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_KEY: ${{ secrets.ONESIGNAL_REST_KEY }}
        run: ./gradlew bundleRelease

      - name: Install dependencies
        run: sudo apt-get install wget unzip -y

      - name: Process Artifacts
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          wget -q -O /tmp/bundletool.jar \
            https://github.com/google/bundletool/releases/download/1.18.3/bundletool-all-1.18.3.jar

          BUNDLE_DIR="app/build/outputs/bundle/release"
          AAB_FILE=$(ls $BUNDLE_DIR/*.aab | head -n 1)
          echo "aabFile=$AAB_FILE" >> $GITHUB_ENV

          java -jar /tmp/bundletool.jar build-apks \
            --bundle=$AAB_FILE \
            --output=universal.apks \
            --mode=universal \
            --ks=/tmp/key.jks \
            --ks-pass=pass:$KEYSTORE_PASSWORD \
            --ks-key-alias=$KEY_ALIAS \
            --key-pass=pass:$KEY_PASSWORD

          unzip -p universal.apks universal.apk > "NowBrief-${VERSION}-universal.apk"
          echo "universalApk=NowBrief-${VERSION}-universal.apk" >> $GITHUB_ENV

      - name: Extract changelog from README
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          python3 - << PYEOF
          import re
          version = "$VERSION"
          with open("README.md", "r") as f:
              readme = f.read()
          # Match "### v<VERSION> — ..." block up to next "### v" or end
          pattern = rf"(### v{re.escape(version)}[^\n]*\n.*?)(?=\n### v|\Z)"
          match = re.search(pattern, readme, re.DOTALL)
          notes = match.group(1).strip() if match else f"NowBrief v{version}"
          with open("/tmp/release_notes.md", "w") as f:
              f.write(f"## NowBrief v{version}\n\n")
              f.write(notes + "\n\n")
              f.write("---\n\n")
              f.write(f"**Install:** Download `NowBrief-{version}-universal.apk` below.\n\n")
              f.write("**Setup:** Tap Start → allow overlay → Start NowBar Meter → allow notifications → Start again ✅\n")
          PYEOF

      - name: Delete existing release/tag (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          RELEASE_ID=$(gh api repos/MukulBolt9/xz/releases/tags/$TAG --jq '.id' 2>/dev/null | tr -d '[:space:]' || true)
          if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "null" ]; then
            gh api -X DELETE "repos/MukulBolt9/xz/releases/$RELEASE_ID" || true
          fi
          gh api -X DELETE "repos/MukulBolt9/xz/git/refs/tags/$TAG" 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: NowBrief ${{ steps.ver.outputs.tag }}
          prerelease: ${{ steps.ver.outputs.is_release == 'false' }}
          generate_release_notes: false
          body_path: /tmp/release_notes.md
          files: |
            ${{ env.aabFile }}
            ${{ env.universalApk }}
